version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sap_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sap_procurement
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sap_procurement"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: sap_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sap_procurement?schema=public
      - JWT_SECRET=sap_procurement_production_secret_key_2026
      - COPILOT_API_KEY=${COPILOT_API_KEY}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && node --loader tsx prisma/seed.ts && npm start"

  frontend:
    build:
      context: .
    container_name: sap_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
